<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>testing</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/webtorrent/webtorrent.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mux.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;overflow:hidden}
video{width:100vw;height:100vh;object-fit:contain;background:#000}
.bottom-bar{position:fixed;bottom:10px;left:10px;right:10px;background:#111;padding:10px;border-radius:10px;display:flex;gap:10px}
input{flex:1;padding:10px;background:#000;border:1px solid #333;color:#fff}
button{padding:10px;background:#69d2de;border:none;color:#000;font-weight:bold;cursor:pointer}
#status{min-width:120px;color:#aaa}
</style>

</head>
<body>

<video id="video" controls playsinline></video>

<div class="bottom-bar">
  <input id="urlInput" placeholder="Paste ANY link (mp4, m3u8, mpd, magnet, ts)">
  <button id="loadBtn">Load</button>
  <div id="status">Idle</div>
</div>

<script>
const video = document.getElementById("video");
const status = document.getElementById("status");

let hls=null, dash=null;
const torrentClient = new WebTorrent();

// ---------- CLEANUP ----------
function resetAll(){
  if(hls){hls.destroy();hls=null;}
  if(dash){dash.reset();dash=null;}
  video.src="";
}

// ---------- TS PLAYER (mux.js) ----------
async function playTS(url){
  try{
    setStatus("Trying TS stream...");
    const res = await fetch(url);
    const reader = res.body.getReader();

    const transmuxer = new muxjs.mp4.Transmuxer();
    const mediaSource = new MediaSource();
    video.src = URL.createObjectURL(mediaSource);

    mediaSource.addEventListener('sourceopen', ()=>{
      const sourceBuffer = mediaSource.addSourceBuffer('video/mp4; codecs="avc1.42E01E, mp4a.40.2"');

      transmuxer.on('data', segment=>{
        sourceBuffer.appendBuffer(segment.initSegment);
        sourceBuffer.appendBuffer(segment.data);
      });

      function read(){
        reader.read().then(({done,value})=>{
          if(done) return;
          transmuxer.push(value);
          transmuxer.flush();
          read();
        });
      }
      read();
    });

    setStatus("Streaming TS...");
  }catch(e){
    setStatus("TS failed");
    fallbackNative(url);
  }
}

// ---------- UNIVERSAL LOADER ----------
function loadVideo(url){
  let clean = (url||"").trim();
  if(!clean) return setStatus("Paste a link");

  resetAll();
  setStatus("Loading...");

  // TORRENT
  if(clean.startsWith("magnet:") || clean.endsWith(".torrent")){
    torrentClient.add(clean, torrent=>{
      const file = torrent.files.find(f=>f.name.endsWith(".mp4")||f.name.endsWith(".webm"));
      if(!file) return setStatus("No video in torrent");
      file.renderTo(video,{autoplay:true});
      setStatus("Torrent streaming");
    });
    return;
  }

  // HLS
  if(window.Hls && Hls.isSupported()){
    try{
      hls = new Hls();
      hls.loadSource(clean);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
        video.play();
        setStatus("HLS stream");
      });
      hls.on(Hls.Events.ERROR, ()=>tryNext());
      return;
    }catch{}
  }

  // DASH
  if(clean.includes(".mpd") && window.dashjs){
    dash = dashjs.MediaPlayer().create();
    dash.initialize(video, clean, true);
    setStatus("DASH stream");
    return;
  }

  // TS attempt
  if(clean.includes(".ts") || clean.includes("gohyperspeed")){
    playTS(clean);
    return;
  }

  // fallback
  fallbackNative(clean);

  function tryNext(){
    if(clean.includes(".ts") || clean.includes("gohyperspeed")){
      playTS(clean);
    } else {
      fallbackNative(clean);
    }
  }
}

// ---------- FALLBACK ----------
function fallbackNative(url){
  video.src=url;
  video.load();
  video.play().catch(()=>{});
  setStatus("Native mode");
}

// ---------- STATUS ----------
function setStatus(t){ status.textContent=t; }

// ---------- UI ----------
document.getElementById("loadBtn").onclick=()=>{
  loadVideo(document.getElementById("urlInput").value);
};
</script>

</body>
</html>
