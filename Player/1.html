<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Universal Video Player</title>

<!-- Streaming libraries -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/webtorrent/webtorrent.min.js"></script>

<style>
:root{--bg:#000;--panel:rgba(12,12,12,.88);--text:#fff;--muted:#c6c6c6;--line:rgba(255,255,255,.16);--accent:#69d2de}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#000;color:var(--text);font-family:Arial,sans-serif}
body{overflow:hidden}
video{width:100vw;height:100vh;object-fit:contain;background:#000}
button,input{font:inherit;color:inherit}
.btn{height:52px;padding:0 14px;border-radius:12px;border:1px solid var(--line);background:#1d1d1d;cursor:pointer;font-size:18px;font-weight:700}
.btn-primary{background:var(--accent);color:#001316;border:none}
.bottom-bar{position:fixed;left:16px;right:16px;bottom:16px;padding:12px 16px;background:var(--panel);border:1px solid var(--line);border-radius:18px;display:flex;align-items:center;gap:12px;z-index:20;backdrop-filter:blur(8px);font-size:16px;transition:opacity .3s}
.bottom-bar.hidden{opacity:0;pointer-events:none}
.bottom-bar input[type="text"]{flex:3;height:52px;padding:0 16px;background:#111;border:1px solid var(--line);border-radius:12px;font-size:18px}
.jump-box{display:flex;align-items:center;gap:8px;background:#111;padding:6px;border-radius:12px;border:1px solid var(--line);margin-left:auto}
.jump-box input{width:180px;height:42px;font-size:18px;padding:0 12px}
.jump-box .btn{height:42px;min-width:78px;font-size:16px}
.status{min-width:120px;color:var(--muted)}
.top-time{position:fixed;top:24px;right:24px;padding:12px 16px;background:rgba(12,12,12,.88);border:1px solid var(--line);border-radius:12px;backdrop-filter:blur(8px);font-size:20px;font-weight:700;color:var(--text);z-index:10;transition:opacity .3s}
.top-time.hidden{opacity:0;pointer-events:none}
.clock{position:fixed;top:24px;left:50%;transform:translateX(-50%);padding:8px 16px;background:rgba(12,12,12,.88);border:1px solid var(--line);border-radius:12px;backdrop-filter:blur(8px);font-size:20px;font-weight:700;color:var(--text);z-index:10;transition:opacity .3s}
.clock.hidden{opacity:0;pointer-events:none}
:focus-visible{outline:3px solid var(--accent);outline-offset:3px}
</style>
</head>
<body>

<video id="video" playsinline webkit-playsinline preload="metadata" controls></video>

<div class="top-time" id="time">00:00 / 00:00</div>
<div class="clock" id="clock"></div>

<div class="bottom-bar" id="bottomBar">
  <input id="urlInput" type="text" placeholder="Paste link, magnet, or 1-3">
  <button class="btn btn-primary" id="loadBtn">Load</button>
  <div class="jump-box">
    <input id="jumpInput" type="text" placeholder="0230 = 02:30">
    <button class="btn" id="jumpBtn">Jump</button>
  </div>
  <div class="status" id="status">No video loaded</div>
</div>

<script>
const video = document.getElementById("video");
const bottomBar = document.getElementById("bottomBar");
const timeEl = document.getElementById("time");
const clockEl = document.getElementById("clock");
const urlInput = document.getElementById("urlInput");
const loadBtn = document.getElementById("loadBtn");
const jumpInput = document.getElementById("jumpInput");
const jumpBtn = document.getElementById("jumpBtn");
const status = document.getElementById("status");

let barVisible = true;
let tapTimeout;
let isPlaying = false;
let hls = null;
let dashPlayer = null;
const torrentClient = new WebTorrent();

// ---------- UI ----------
function toggleBar() {
  barVisible = !barVisible;
  bottomBar.classList.toggle("hidden", !barVisible);
}

function updateTopVisibility() {
  if (isPlaying) { timeEl.classList.add("hidden"); clockEl.classList.add("hidden"); }
  else { timeEl.classList.remove("hidden"); clockEl.classList.remove("hidden"); }
}

function hideBarDelayed() {
  clearTimeout(tapTimeout);
  if (isPlaying) tapTimeout = setTimeout(() => barVisible && toggleBar(), 3000);
}

// ---------- Time ----------
function fmtHM(t) {
  if (!isFinite(t)) return "00:00";
  const h = Math.floor(t/3600), m = Math.floor((t%3600)/60);
  return String(h).padStart(2,'0') + ":" + String(m).padStart(2,'0');
}
function updateTime() { timeEl.textContent = fmtHM(video.currentTime) + " / " + fmtHM(video.duration); }

// ---------- Jump ----------
function parseJump(value) {
  const v = (value||'').trim().replace(/[^0-9:]/g,'');
  if (!v) return null;
  if (v.includes(':')) { const p=v.split(':').map(Number); return p[0]*60+p[1]; }
  if (v.length===4) return parseInt(v.substr(0,2))*60+parseInt(v.substr(2,2));
  return Number(v);
}

// ---------- Cleanup ----------
function resetPlayers() {
  if (hls) { hls.destroy(); hls=null; }
  if (dashPlayer) { dashPlayer.reset(); dashPlayer=null; }
  video.src=''; video.load();
}

// ---------- Universal loader ----------
function loadVideo(url) {
  let clean = (url||'').trim();
  if(!clean) return setStatus("Paste a link");
  if(clean.match(/^[a-zA-Z0-9]{1}$/)) clean="https://tailliuir.me/Player/"+clean;

  resetPlayers();
  isPlaying=false;
  setStatus("Loading...");

  // Torrent / magnet
  if(clean.startsWith("magnet:") || clean.endsWith(".torrent")) {
    torrentClient.add(clean, torrent=>{
      const file = torrent.files.find(f=>f.name.endsWith(".mp4")||f.name.endsWith(".webm"));
      if(!file) return setStatus("No playable video in torrent");
      file.renderTo(video, { autoplay:true });
      setStatus("Streaming torrent: " + file.name);
    });
    return;
  }

  // HLS
  if(window.Hls && Hls.isSupported()) {
    try {
      hls = new Hls();
      hls.loadSource(clean);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=>{ video.play(); setStatus("Streaming HLS"); });
      hls.on(Hls.Events.ERROR, ()=>fallbackNative(clean));
      return;
    } catch{}
  } else if(video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src=clean; video.play(); setStatus("Streaming HLS native");
    return;
  }

  // DASH
  if(clean.includes(".mpd") && window.dashjs) {
    dashPlayer = dashjs.MediaPlayer().create();
    dashPlayer.initialize(video, clean, true);
    setStatus("DASH stream");
    return;
  }

  // fallback native
  fallbackNative(clean);
}

function fallbackNative(url) {
  video.src=url; video.load(); setStatus("Standard video");
}

// ---------- Controls ----------
loadBtn.onclick = ()=>loadVideo(urlInput.value);
jumpBtn.onclick = ()=>{
  const secs=parseJump(jumpInput.value);
  if(secs==null) return setStatus("Enter 0230 or 1:23");
  video.currentTime=secs;
  setStatus("Jumped to "+fmtHM(secs));
}

// ---------- Events ----------
video.addEventListener("timeupdate", updateTime);
video.addEventListener("play", ()=>{ isPlaying=true; setStatus("Playing"); updateTopVisibility(); hideBarDelayed(); });
video.addEventListener("pause", ()=>{ isPlaying=false; setStatus("Paused"); updateTopVisibility(); });
video.addEventListener("waiting", ()=>setStatus("Buffering"));
video.addEventListener("ended", ()=>{ isPlaying=false; setStatus("Ended"); updateTopVisibility(); });
video.addEventListener("error", ()=>setStatus("Cannot play link"));

// ---------- Clock ----------
function updateClock() { clockEl.textContent=new Date().toLocaleTimeString("en-GB",{hour12:false}); }
setInterval(updateClock,1000);
updateClock();

// ---------- Click ----------
document.addEventListener("click", e=>{
  if(e.target.closest(".bottom-bar")) return;
  toggleBar();
  if(video.src) video.paused ? video.play() : video.pause();
});
</script>

</body>
</html>
